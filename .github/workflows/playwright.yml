name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x, lts/*]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Publish Playwright JUnit results
        uses: dorny/test-reporter@v1
        if: always()
        continue-on-error: true
        with:
          name: Playwright tests
          path: test-results/results.xml
          reporter: junit
          fail-on-error: false

      - name: Generate Allure report
        if: always()
        shell: bash
        run: |
          if [ -d "allure-results" ] && [ -n "$(ls -A allure-results 2>/dev/null | head -n 1)" ]; then
            npx allure generate allure-results --clean -o allure-report
          else
            echo "Skipping Allure generation: allure-results is missing or empty"
          fi

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: allure-report-${{ matrix.os }}-node${{ matrix.node-version }}

          path: allure-report/
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        continue-on-error: true
        with:
          name: playwright-report-${{ matrix.os }}-node${{ matrix.node-version }}

          path: playwright-report/
          retention-days: 30

      - name: Upload test-results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        continue-on-error: true
        with:
          name: test-results-${{ matrix.os }}-node${{ matrix.node-version }}

          path: test-results/
          retention-days: 30
